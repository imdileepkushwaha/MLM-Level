<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Gateway - Elite MLM Level Network</title>
    <link rel="stylesheet" href="/lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/css/site.css?v=s13z6aOmPeTzwmIFe0r0vcDJ4mLtYDDmckbT0WqDdU8" />
    <style>
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(circle at 10% 20%, rgba(243, 244, 246, 0.6) 0%, rgba(229, 231, 235, 0.6) 90%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        .light-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            padding: 2.5rem 2rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .light-card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 10px 10px -6px rgba(0, 0, 0, 0.08);
        }
        .icon-box {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: rgba(245, 158, 11, 0.08);
            color: #d97706;
            border: 1px solid rgba(245, 158, 11, 0.2);
            margin: 0 auto 1.5rem;
        }
        .form-control {
            border: 1px solid #cbd5e1;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            background-color: #f8fafc;
        }
        .form-control:focus {
            background-color: #ffffff;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.15);
        }
        .btn-submit {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            border: none;
            color: #1e293b;
            font-weight: 600;
            padding: 0.8rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #f59e0b 0%, #b45309 100%);
            color: #ffffff;
            transform: translateY(-1px);
        }
        .text-secondary-custom {
            color: #64748b;
        }
        .border-light-custom {
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="light-card">
            <div class="text-center">
                <div class="icon-box">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h3 class="fw-bold text-dark mb-1">Admin Portal</h3>
                <p class="text-secondary-custom small mb-4">Authorized Personnel Only</p>
            </div>

            <form method="post" action="/Admin/Login">
                

                <div class="mb-3">
                    <label class="form-label text-dark small fw-semibold">Admin Username or Email</label>
                    <input class="form-control rounded-3 input-validation-error" placeholder="e.g. admin" required type="text" data-val="true" data-val-required="Username or Email is required" id="UsernameOrEmail" name="UsernameOrEmail" value="" />
                    <span class="text-danger small mt-1 d-block field-validation-error" data-valmsg-for="UsernameOrEmail" data-valmsg-replace="true">Username or Email is required</span>
                </div>

                <div class="mb-3">
                    <label class="form-label text-dark small fw-semibold">Security Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control rounded-3 pe-5" placeholder="••••••••" required data-val="true" data-val-required="Password is required" id="Password" name="Password" />
                        <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2 border-0 bg-transparent text-secondary py-0 px-2" onclick="togglePasswordVisibility(this)" style="z-index: 10;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <span class="text-danger small mt-1 d-block field-validation-valid" data-valmsg-for="Password" data-valmsg-replace="true"></span>
                </div>

                <div class="mb-4 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" data-val="true" data-val-required="The RememberMe field is required." id="RememberMe" name="RememberMe" value="true" />
                        <label class="form-check-label text-secondary-custom small" for="RememberMe">Maintain Session</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit w-100 shadow-sm">
                    <i class="bi bi-unlock-fill me-1"></i>Secure Authenticate
                </button>
            <input name="__RequestVerificationToken" type="hidden" value="CfDJ8H0c-K3HQXBPnZ48XCwdEaXYib6MGJHxjw05ufdOazsLztp7LE5c_ifJbbeq1LmC3UUnbMLkPc2p3zG8vbzAYkoi8FrI-gA9uU7674hYJUKoZa9qBI6B0KQaO61ws_jzdk0mGwTU5NR1pMcB6CWPWMg" /><input name="RememberMe" type="hidden" value="false" /></form>

            <div class="text-center mt-4 pt-3 border-light-custom">
                <a class="text-secondary-custom text-decoration-none small" href="/"><i class="bi bi-arrow-left me-1"></i>Back to Homepage</a>
            </div>
        </div>
    </div>

    <script src="/lib/jquery/dist/jquery.min.js"></script>
    <script src="/lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/site.js?v=_oxCUuz4T4M7ZrOU3V7kPCtNUbfqEhRyJhyMOtDYksQ"></script>
    <script src="/lib/jquery-validation/dist/jquery.validate.min.js"></script>
<script src="/lib/jquery-validation-unobtrusive/dist/jquery.validate.unobtrusive.min.js"></script>

</body>
</html>
